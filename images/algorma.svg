<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1e1f22" />
      <stop offset="100%" stop-color="#2b2d31" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#5865F2" />
      <stop offset="100%" stop-color="#7289DA" />
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
  </defs>

  <rect width="800" height="600" fill="url(#bg)" />
  
  <pattern id="grid" width="60" height="60" patternUnits="userSpaceOnUse">
    <path d="M 60 0 L 0 0 0 60" fill="none" stroke="#ffffff" stroke-opacity="0.03" stroke-width="2" />
  </pattern>
  <rect width="800" height="600" fill="url(#grid)" />

  <g transform="translate(400, 300)">
    <circle cx="0" cy="0" r="140" fill="#313338" filter="url(#glow)" />
    <path d="M -80 -20 Q 0 -50 80 -20 L 70 50 Q 0 80 -70 50 Z" fill="url(#accent)" />
    <circle cx="-35" cy="15" r="16" fill="#FFFFFF" />
    <circle cx="35" cy="15" r="16" fill="#FFFFFF" />
    <path d="M -20 45 Q 0 55 20 45" fill="none" stroke="#FFFFFF" stroke-opacity="0.8" stroke-width="4" stroke-linecap="round" />
    
    <!-- Floating details -->
    <rect x="-100" y="-120" width="12" height="12" rx="3" fill="#5865F2" opacity="0.6" transform="rotate(15, -100, -120)" />
    <rect x="80" y="-140" width="16" height="16" rx="4" fill="#7289DA" opacity="0.8" transform="rotate(-20, 80, -140)" />
    <circle cx="110" cy="90" r="8" fill="#5865F2" opacity="0.5" />
    <circle cx="-130" cy="80" r="6" fill="#FFFFFF" opacity="0.3" />
  </g>

  <text x="400" y="520" font-family="'Inter', sans-serif" font-weight="700" font-size="32" fill="#FFFFFF" text-anchor="middle" letter-spacing="2">ALGORMA</text>
  <text x="400" y="555" font-family="'Inter', sans-serif" font-weight="500" font-size="16" fill="#8d949e" text-anchor="middle" letter-spacing="6">DISCORD BOT</text>

</svg>
